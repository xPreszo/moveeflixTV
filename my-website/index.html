<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyFlix</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<div class="site-header">
  <img src="logo.png" class="site-logo">
  <div class="main-title">MYFLIX</div>
  <div class="subtitle">Unlimited movies, shows, and more</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png">
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Movies</a>
    <a href="#">Series</a>
    <input type="text" class="search-bar" placeholder="Search..." onclick="openSearch()">
  </div>
</div>

<!-- BANNER -->
<div class="banner" style="background-image: url('banner.jpg');">
  <h1>Featured Movie Title</h1>
</div>

<!-- MOVIE ROW -->
<div class="row">
  <h2>Trending Now</h2>
  <div class="list">
    <img src="movie1.jpg" onclick="openModal('Movie 1')">
    <img src="movie2.jpg" onclick="openModal('Movie 2')">
    <img src="movie3.jpg" onclick="openModal('Movie 3')">
    <img src="movie4.jpg" onclick="openModal('Movie 4')">
  </div>
</div>

<div class="row">
  <h2>Popular</h2>
  <div class="list">
    <img src="movie5.jpg" onclick="openModal('Movie 5')">
    <img src="movie6.jpg" onclick="openModal('Movie 6')">
    <img src="movie7.jpg" onclick="openModal('Movie 7')">
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <div class="modal-body">
      <img src="movie1.jpg" id="modal-img">
      <div class="modal-text">
        <h2 id="modal-title">Title</h2>
        <p>Movie description goes here. This is a Netflix-style preview.</p>
        <div class="stars">★★★★★</div>
      </div>
    </div>

    <div class="server-selector">
      <label>Select Server:</label>
      <select>
        <option>Server 1</option>
        <option>Server 2</option>
      </select>
    </div>

  </div>
</div>

<!-- SEARCH MODAL -->
<div class="search-modal" id="searchModal">
  <span class="close" onclick="closeSearch()">&times;</span>
  <input type="text" placeholder="Search movies...">

  <div class="results">
    <img src="movie1.jpg">
    <img src="movie2.jpg">
    <img src="movie3.jpg">
  </div>
</div>

<!-- DISCLAIMER MODAL -->
<div id="disclaimer-modal">
  <div class="modal-content">
    <h2>Disclaimer</h2>
    <p>This site is for educational purposes only.</p>
    <button onclick="closeDisclaimer()">Accept</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-content">
    <p>© 2026 MyFlix</p>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </div>
</div>

<!-- JAVASCRIPT -->
<script>
function openModal(title) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-title").innerText = title;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function openSearch() {
  document.getElementById("searchModal").style.display = "flex";
}

function closeSearch() {
  document.getElementById("searchModal").style.display = "none";
}

function closeDisclaimer() {
  document.getElementById("disclaimer-modal").style.display = "none";
}

// Show disclaimer on load
window.onload = () => {
  document.getElementById("disclaimer-modal").classList.add("show");
};
</script>

</body>
</html>
