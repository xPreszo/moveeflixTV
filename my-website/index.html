<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">NETFLIX</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">TV Shows</a>
    <a href="#">Movies</a>
    <a href="#">My List</a>
  </div>
</div>

<!-- HERO -->
<header class="hero">
  <h1>Stranger Things</h1>
  <p>When a young boy disappears, his mother must confront terrifying forces.</p>
  <div class="hero-buttons">
    <button class="btn btn-play">▶ Play</button>
    <button class="btn btn-info">ℹ More Info</button>
  </div>
</header>

<!-- ROW -->
<section class="row">
  <h2>Trending Now</h2>
  <div class="row-posters">
    <img class="poster" src="img1.jpg">
    <img class="poster" src="img2.jpg">
    <img class="poster" src="img3.jpg">
    <img class="poster" src="img4.jpg">
    <img class="poster" src="img5.jpg">
  </div>
</section>

<!-- ROW LARGE -->
<section class="row">
  <h2>Top Rated</h2>
  <div class="row-posters">
    <img class="poster large" src="img6.jpg">
    <img class="poster large" src="img7.jpg">
    <img class="poster large" src="img8.jpg">
    <img class="poster large" src="img9.jpg">
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>Netflix Clone © 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
