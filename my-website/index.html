<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyFlix</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png">
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">TV Shows</a>
    <a href="#">Movies</a>
    <input type="text" class="search-bar" placeholder="Search..." id="searchInput">
  </div>
</div>

<!-- HERO BANNER -->
<div class="banner" id="banner">
  <h1 id="banner-title">Loading...</h1>
</div>

<!-- MOVIE ROWS -->
<div id="rows"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <div class="modal-body">
      <img id="modal-img">
      <div class="modal-text">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <div class="stars" id="modal-rating"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
